<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&family=DynaPuff:wght@400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    </style>
    <link rel="stylesheet" href="currency converter.css">
</head>

<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form action="">
            <div class="amount">
                <p class="enter">Enter Amount</p>
                <input type="text" value="100">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>from:</p>
                    <div class="select-container">
                        <img class="flag" src="https://flagsapi.com/US/flat/64.png">
                        <select name="from" class="select"></select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left icon"></i>
                <div class="to">
                    <p>To:</p>
                    <div class="select-container">
                        <img class="flag" src="https://flagsapi.com/NP/flat/64.png">
                        <select name="to" class="select"></select>
                    </div>
                </div>
            </div>
            <div class="msg">WHAT IS THE EXCHANGE RATE TODAY?</div>
            <div class="btn-container">
                <button id="submit">Get Exchange Rate</button>
            </div>
        </form>
    </div>
</body>
<script src="currency converter.js"></script>
<script>
    const base_url = "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies"

    let dropdowns = document.querySelectorAll(".dropdown select")
    let btn = document.querySelector("button")
    let fromcurr = document.querySelector(".from select")
    let tocurr = document.querySelector(".to select")
    let msg = document.querySelector(".msg")

    for (let select of dropdowns) {
        for (let key in countryList) {
            let newoption = document.createElement("option")
            newoption.innerText = key
            newoption.value = key
            select.append(newoption)

            if (select.name === "from" && key === "USD") {
                newoption.selected = true
            }
            if (select.name === "to" && key === "NPR") {
                newoption.selected = true
            }
        }

        select.addEventListener("change", (evt) => {
            updateflag(evt.target)
        })
    }

    function updateflag(element) {
        let currCode = element.value
        let countryCode = countryList[currCode]
        let img = element.parentElement.querySelector("img")
        img.src = `https://flagsapi.com/${countryCode}/flat/64.png`
    }

    btn.addEventListener("click", async (evt) => {
        evt.preventDefault()

        let amount = document.querySelector("input")
        let amtval = amount.value

        if (amtval === "" || amtval < 1) {
            amtval = 1
            amount.value = 1
        }

        const URL = `${base_url}/${fromcurr.value.toLowerCase()}.json`

        let response = await fetch(URL)
        let data = await response.json()
        let rate = data[fromcurr.value.toLowerCase()][tocurr.value.toLowerCase()]
        console.log(rate)
        console.log(amount.value)
        let result = amount.value * rate
        msg.innerText = `${amount.value} ${fromcurr.value}=${result} ${tocurr.value}`
    })

</script>

</html>
