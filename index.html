<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&family=DynaPuff:wght@400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    </style>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form action="">
            <div class="amount">
                <p class="enter">Enter Amount</p>
                <input type="text" value="100">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>from:</p>
                    <div class="select-container">
                        <img class="flag" src="https://flagsapi.com/US/flat/64.png">
                        <select name="from" class="select"></select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left icon"></i>
                <div class="to">
                    <p>To:</p>
                    <div class="select-container">
                        <img class="flag" src="https://flagsapi.com/NP/flat/64.png">
                        <select name="to" class="select"></select>
                    </div>
                </div>
            </div>
            <div class="msg">WHAT IS THE EXCHANGE RATE TODAY?</div>
            <div class="btn-container">
                <button id="submit">Get Exchange Rate</button>
            </div>
        </form>
    </div>
</body>

<script src="script.js"></script>

</html>
